server:
  port: 8080

app:
  security:
    mode: oauth2-login
    enabled: false
  gateway:
    base-url: ${APP_GATEWAY_BASE_URL:http://localhost:8081}

---
spring:
  config:
    activate:
      on-profile: secure
  security:
    oauth2:
      client:
        registration:
          keycloak:
            provider: keycloak
            client-id: mybank-front
            client-secret: ${KEYCLOAK_FRONT_SECRET:front-secret-change-me}
            scope: openid,profile
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          keycloak:
            authorization-uri: ${KEYCLOAK_AUTHORIZATION_URI:http://localhost:8090/realms/mybank/protocol/openid-connect/auth}
            token-uri: ${KEYCLOAK_TOKEN_URI:http://localhost:8090/realms/mybank/protocol/openid-connect/token}
            jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8090/realms/mybank/protocol/openid-connect/certs}
            user-name-attribute: preferred_username
app:
  security:
    enabled: true
