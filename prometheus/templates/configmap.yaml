{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "prometheus.configMapName" . }}
  labels:
    {{- include "prometheus.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        metrics_path: /prometheus/metrics
        static_configs:
          - targets:
              - localhost:9090

      - job_name: mybank-services
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - {{ .Release.Name }}-gateway:8081
              - {{ .Release.Name }}-front:8080
              - {{ .Release.Name }}-accounts-service:8091
              - {{ .Release.Name }}-cash-service:8092
              - {{ .Release.Name }}-transfer-service:8093
              - {{ .Release.Name }}-notifications-service:8094
{{- end }}
