spring:
  cloud:
    discovery:
      enabled: false
    client:
      hostname: localhost
      ip-address: 127.0.0.1
    config:
      enabled: false
  datasource:
    url: jdbc:h2:mem:mybank_notifications;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    properties:
      hibernate.default_schema: notifications
  config:
    import: ""
  kafka:
    consumer:
      group-id: notifications-service-test
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.mybank.notification.events
        spring.json.value.default.type: com.mybank.notification.events.NotificationEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

eureka:
  client:
    enabled: false

app:
  kafka:
    topic: bank.notifications
  security:
    enabled: false
