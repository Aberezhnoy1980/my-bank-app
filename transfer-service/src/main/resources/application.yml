spring:
  application:
    name: transfer-service
  config:
    import: optional:configserver:http://localhost:8888

server:
  port: 8093

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

app:
  accounts:
    base-url: http://localhost:8081
  transfer:
    sender-username: demo.user

management:
  endpoints:
    web:
      exposure:
        include: health,info
