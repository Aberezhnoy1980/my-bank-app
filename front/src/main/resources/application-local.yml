server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

app:
  security:
    mode: oauth2-login
    enabled: false
  gateway:
    base-url: ${APP_GATEWAY_BASE_URL:http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: secure
  security:
    oauth2:
      client:
        registration:
          keycloak:
            provider: keycloak
            client-id: mybank-front
            client-secret: ${KEYCLOAK_FRONT_SECRET:front-secret-change-me}
            scope: openid,profile
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          keycloak:
            # Без issuer-uri: иначе discovery по внутреннему URL в Docker отдаёт authorization → http://keycloak:8080 (браузер не откроет).
            authorization-uri: ${KEYCLOAK_AUTHORIZATION_URI:http://localhost:8090/realms/mybank/protocol/openid-connect/auth}
            token-uri: ${KEYCLOAK_TOKEN_URI:http://localhost:8090/realms/mybank/protocol/openid-connect/token}
            # user-info-uri не задаём: при KC_HOSTNAME_URL=localhost:8090 вызов UserInfo на keycloak:8080 даёт 401;
            # для OIDC достаточно claims в ID token (openid profile).
            jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8090/realms/mybank/protocol/openid-connect/certs}
            user-name-attribute: preferred_username
app:
  security:
    enabled: true
