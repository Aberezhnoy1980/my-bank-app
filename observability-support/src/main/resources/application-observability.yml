management:
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  observations:
    jdbc:
      enabled: true

spring:
  kafka:
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
