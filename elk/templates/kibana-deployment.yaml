{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "elk.kibanaFullname" . }}
  labels:
    {{- include "elk.labels" . | nindent 4 }}
    app.kubernetes.io/component: kibana
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "elk.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: kibana
  template:
    metadata:
      labels:
        {{- include "elk.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: kibana
    spec:
      containers:
        - name: kibana
          image: "{{ .Values.image.kibana.repository }}:{{ .Values.image.kibana.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.kibana.service.port }}
          env:
            - name: ELASTICSEARCH_HOSTS
              value: "http://{{ include "elk.elasticsearchFullname" . }}:{{ .Values.elasticsearch.service.port }}"
          startupProbe:
            httpGet:
              path: /api/status
              port: http
            failureThreshold: 60
            periodSeconds: 10
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            periodSeconds: 10
            timeoutSeconds: 10
          resources:
            {{- toYaml .Values.kibana.resources | nindent 12 }}
{{- end }}
