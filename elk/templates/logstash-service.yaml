{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "elk.logstashFullname" . }}
  labels:
    {{- include "elk.labels" . | nindent 4 }}
    app.kubernetes.io/component: logstash
spec:
  type: ClusterIP
  selector:
    {{- include "elk.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: logstash
  ports:
    - name: tcp
      port: {{ .Values.logstash.service.port }}
      targetPort: tcp
{{- end }}
