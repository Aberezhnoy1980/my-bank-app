{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "elk.kibanaFullname" . }}
  labels:
    {{- include "elk.labels" . | nindent 4 }}
    app.kubernetes.io/component: kibana
spec:
  type: ClusterIP
  selector:
    {{- include "elk.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: kibana
  ports:
    - name: http
      port: {{ .Values.kibana.service.port }}
      targetPort: http
{{- end }}
