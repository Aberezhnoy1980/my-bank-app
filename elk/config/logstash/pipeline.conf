input {
  tcp {
    port => 5044
    codec => json_lines
  }
}

filter {
  if [password] {
    mutate { replace => { "password" => "***" } }
  }
  if [message] {
    mutate {
      gsub => [
        "message", "(?i)(password|passwd|secret|token|authorization)\s*[=:]\s*\S+", "\1=***",
        "message", "(?i)Bearer\s+\S+", "Bearer ***",
        "message", "(?i)(account|accountNumber|card)\s*[=:]\s*\d+", "\1=***"
      ]
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://ELASTICSEARCH_HOST:9200"]
    index => "mybank-%{+YYYY.MM.dd}"
  }
  stdout { codec => dots }
}
