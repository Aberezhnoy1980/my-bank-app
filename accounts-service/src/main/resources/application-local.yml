spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:mybank}
    username: ${POSTGRES_USER:mybank}
    password: ${POSTGRES_PASSWORD:mybank}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.default_schema: accounts
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: accounts
    liquibase-schema: public

server:
  port: 8091

app:
  kafka:
    topic: ${APP_KAFKA_TOPIC:bank.notifications}

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: secure
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8090/realms/mybank}
app:
  security:
    enabled: true
