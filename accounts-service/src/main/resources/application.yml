spring:
  application:
    name: accounts-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:mybank}
    username: ${POSTGRES_USER:mybank}
    password: ${POSTGRES_PASSWORD:mybank}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.default_schema: accounts
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: accounts
    liquibase-schema: public
  config:
    import: optional:configserver:http://localhost:8888

server:
  port: 8091

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

app:
  notifications:
    base-url: ${APP_NOTIFICATIONS_BASE_URL:http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: secure
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8090/realms/mybank}
      client:
        registration:
          services-client:
            provider: keycloak
            client-id: mybank-services
            client-secret: ${KEYCLOAK_SERVICE_SECRET:services-secret-change-me}
            authorization-grant-type: client_credentials
            scope: openid
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8090/realms/mybank}
app:
  security:
    enabled: true
  oauth2:
    client-registration-id: services-client
