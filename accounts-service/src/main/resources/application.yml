spring:
  application:
    name: accounts-service
  config:
    import: optional:configserver:http://localhost:8888

server:
  port: 8091

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

app:
  notifications:
    base-url: http://localhost:8081

management:
  endpoints:
    web:
      exposure:
        include: health,info
