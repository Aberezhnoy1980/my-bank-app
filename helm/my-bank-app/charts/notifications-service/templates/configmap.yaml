{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "notifications-service.fullname" . }}-config
  labels:
    {{- include "notifications-service.labels" . | nindent 4 }}
data:
  application-k8s.yml: |
    server:
      port: {{ .Values.service.port }}
    spring:
      application:
        name: notifications-service
      datasource:
        url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
        username: ${POSTGRES_USER}
        password: ${POSTGRES_PASSWORD}
        driver-class-name: org.postgresql.Driver
      jpa:
        hibernate:
          ddl-auto: validate
        open-in-view: false
        properties:
          hibernate.default_schema: notifications
      liquibase:
        change-log: classpath:db/changelog/db.changelog-master.yaml
        default-schema: notifications
        liquibase-schema: public
      {{- if .Values.global.kafka.enabled | default true }}
      kafka:
        bootstrap-servers: {{ include "notifications-service.kafkaBootstrapServers" . | quote }}
        consumer:
          group-id: notifications-service
          auto-offset-reset: earliest
          key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
          value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
          properties:
            spring.json.trusted.packages: com.mybank.notification.events
            spring.json.value.default.type: com.mybank.notification.events.NotificationEvent
      {{- end }}
    app:
      {{- if .Values.global.kafka.enabled | default true }}
      kafka:
        topic: {{ include "notifications-service.kafkaTopic" . | quote }}
      {{- end }}
      security:
        enabled: false
    management:
      endpoints:
        web:
          exposure:
            include: health,info,prometheus
      metrics:
        distribution:
          percentiles-histogram:
            http.server.requests: true
          percentiles:
            http.server.requests: 0.5,0.95,0.99
{{- end }}
