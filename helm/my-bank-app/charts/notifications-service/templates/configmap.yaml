{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "notifications-service.fullname" . }}-config
  labels:
    {{- include "notifications-service.labels" . | nindent 4 }}
data:
  application-k8s.yml: |
    server:
      port: {{ .Values.service.port }}
    spring:
      application:
        name: notifications-service
      datasource:
        url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
        username: ${POSTGRES_USER}
        password: ${POSTGRES_PASSWORD}
        driver-class-name: org.postgresql.Driver
      jpa:
        hibernate:
          ddl-auto: validate
        open-in-view: false
        properties:
          hibernate.default_schema: notifications
      liquibase:
        change-log: classpath:db/changelog/db.changelog-master.yaml
        default-schema: notifications
        liquibase-schema: public
      security:
        oauth2:
          resourceserver:
            jwt:
              issuer-uri: {{ include "notifications-service.keycloakIssuerUri" . | quote }}
              jwk-set-uri: {{ include "notifications-service.keycloakJwkSetUri" . | quote }}
          client:
            registration:
              services-client:
                provider: keycloak
                client-id: mybank-services
                client-secret: ${KEYCLOAK_SERVICE_SECRET}
                authorization-grant-type: client_credentials
                scope: openid
            provider:
              keycloak:
                token-uri: {{ printf "http://%s:%v/realms/%s/protocol/openid-connect/token" (include "notifications-service.keycloakHost" .) (.Values.keycloak.port | default 8080) (include "notifications-service.keycloakRealm" .) | quote }}
                jwk-set-uri: {{ printf "http://%s:%v/realms/%s/protocol/openid-connect/certs" (include "notifications-service.keycloakHost" .) (.Values.keycloak.port | default 8080) (include "notifications-service.keycloakRealm" .) | quote }}
    app:
      security:
        enabled: true
      oauth2:
        client-registration-id: services-client
    management:
      endpoints:
        web:
          exposure:
            include: health,info
{{- end }}
