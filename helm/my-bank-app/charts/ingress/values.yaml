enabled: true

# Rancher Desktop (k3s): leave empty or set "traefik". Install ingress-nginx for "nginx".
className: ""

annotations: {}

hosts:
  app: localhost
  # Separate host avoids Traefik path clash with Front (/) on localhost.
  kibana: kibana.localhost

paths:
  front: /
  gateway: /api
  keycloakRealms: /realms
  keycloakAdmin: /admin
  zipkin: /zipkin
  prometheus: /prometheus
  grafana: /grafana
  kibana: /kibana

backendPorts:
  front: 8080
  gateway: 8081
  keycloak: 8080
  zipkin: 9411
  prometheus: 9090
  grafana: 3000
  kibana: 5601

observability:
  # Traefik (Rancher Desktop): strip path prefix before forwarding to Zipkin/Kibana UI.
  zipkinStripPrefix: true
  zipkin:
    enabled: true
  prometheus:
    enabled: true
  grafana:
    enabled: true
  kibana:
    enabled: true
