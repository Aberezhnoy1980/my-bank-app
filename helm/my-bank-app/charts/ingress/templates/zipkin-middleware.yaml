{{- if and .Values.enabled (.Values.observability.zipkin.enabled | default true) (.Values.observability.zipkinStripPrefix | default true) }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: zipkin-stripprefix
  labels:
    {{- include "ingress.labels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - {{ .Values.paths.zipkin }}
{{- end }}
