{{- if and .Values.enabled (.Values.observability.kibana.enabled | default true) }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ingress.fullname" . }}-kibana
  labels:
    {{- include "ingress.labels" . | nindent 4 }}
    app.kubernetes.io/component: observability-kibana
spec:
  {{- if .Values.className }}
  ingressClassName: {{ .Values.className | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.hosts.kibana | default "kibana.localhost" | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ printf "%s-elk-kibana" .Release.Name }}
                port:
                  number: {{ .Values.backendPorts.kibana }}
{{- end }}
