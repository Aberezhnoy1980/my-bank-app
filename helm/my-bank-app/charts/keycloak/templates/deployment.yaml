{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "keycloak.fullname" . }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "keycloak.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "keycloak.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: keycloak
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - start-dev
            {{- if .Values.realmImport.enabled }}
            - --import-realm
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.adminSecretName" . }}
                  key: KEYCLOAK_ADMIN
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.adminSecretName" . }}
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_HOSTNAME
              value: {{ include "keycloak.hostname" . | quote }}
            - name: KC_HOSTNAME_BACKCHANNEL_DYNAMIC
              value: {{ .Values.hostnameBackchannelDynamic | quote }}
            - name: KC_PROXY_HEADERS
              value: {{ .Values.proxyHeaders | quote }}
            - name: KC_HTTP_ENABLED
              value: "true"
          {{- if .Values.realmImport.enabled }}
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
              readOnly: true
          {{- end }}
          readinessProbe:
            httpGet:
              path: /realms/{{ include "keycloak.realm" . }}/.well-known/openid-configuration
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /realms/{{ include "keycloak.realm" . }}/.well-known/openid-configuration
              port: http
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
      {{- if .Values.realmImport.enabled }}
      volumes:
        - name: realm-import
          configMap:
            name: {{ include "keycloak.realmConfigMapName" . }}
      {{- end }}
{{- end }}
