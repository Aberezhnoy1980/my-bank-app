{{- if .Values.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "keycloak.adminSecretName" . }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
type: Opaque
stringData:
  KEYCLOAK_ADMIN: {{ .Values.admin.username | quote }}
  KEYCLOAK_ADMIN_PASSWORD: {{ .Values.admin.password | quote }}
{{- end }}
