# Values for Bitnami Kafka dependency (key must match dependency name "kafka" in Chart.yaml).
# Override from umbrella release: kafka.kafka.*

kafka:
  image:
    repository: bitnamilegacy/kafka

  kraft:
    enabled: true

  controller:
    replicaCount: 1
    persistence:
      enabled: true
      size: 2Gi
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1Gi

  broker:
    replicaCount: 1
    persistence:
      enabled: true
      size: 2Gi
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1Gi

  listeners:
    client:
      protocol: PLAINTEXT
    controller:
      protocol: PLAINTEXT
    interbroker:
      protocol: PLAINTEXT

  extraConfig: |
    auto.create.topics.enable=true
    offsets.topic.replication.factor=1
    transaction.state.log.replication.factor=1
    transaction.state.log.min.isr=1
    default.replication.factor=1
    min.insync.replicas=1
