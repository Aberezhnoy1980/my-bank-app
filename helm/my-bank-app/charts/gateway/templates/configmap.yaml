{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gateway.configMapName" . }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
data:
  application-k8s.yml: |
    server:
      port: {{ .Values.service.port }}
    spring:
      application:
        name: gateway
      cloud:
        gateway:
          routes:
            {{- range .Values.routes }}
            - id: {{ .id }}
              uri: http://{{ $.Release.Name }}-{{ .service }}:{{ .port }}
              predicates:
                - Path={{ .path }}
            {{- end }}
      security:
        oauth2:
          resourceserver:
            jwt:
              issuer-uri: {{ .Values.keycloak.issuerUri | default .Values.global.keycloak.issuerUri | quote }}
    app:
      security:
        enabled: true
    management:
      endpoints:
        web:
          exposure:
            include: health,info
{{- end }}
