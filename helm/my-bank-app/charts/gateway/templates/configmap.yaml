{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gateway.configMapName" . }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
data:
  application-k8s.yml: |
    server:
      port: {{ .Values.service.port }}
    spring:
      application:
        name: gateway
      cloud:
        gateway:
          routes:
            {{- range .Values.routes }}
            - id: {{ .id }}
              uri: http://{{ $.Release.Name }}-{{ .service }}:{{ .port }}
              predicates:
                - Path={{ .path }}
            {{- end }}
      security:
        oauth2:
          resourceserver:
            jwt:
              issuer-uri: {{ include "gateway.keycloakIssuerUri" . | quote }}
              jwk-set-uri: {{ printf "http://%s:%v/realms/%s/protocol/openid-connect/certs" (include "gateway.keycloakHost" .) (.Values.keycloak.port | default 8080) (include "gateway.keycloakRealm" .) | quote }}
    app:
      security:
        enabled: true
    management:
      endpoints:
        web:
          exposure:
            include: health,info
{{- end }}
