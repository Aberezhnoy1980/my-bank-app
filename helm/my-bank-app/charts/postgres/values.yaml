enabled: true

image:
  repository: postgres
  tag: "16-alpine"
  pullPolicy: IfNotPresent

service:
  port: 5432

database: mybank
username: mybank
# Stored in Secret; override for non-dev environments (helm --set postgres.password=...).
password: mybank

persistence:
  enabled: true
  size: 1Gi
  # Leave empty to use the cluster default StorageClass (Rancher Desktop).
  storageClass: ""

replicaCount: 1
