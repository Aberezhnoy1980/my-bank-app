{{- if .Values.zipkin.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-test-zipkin"
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: zipkin
      image: curlimages/curl:8.8.0
      command:
        - /bin/sh
        - -ec
        - curl -fsS "http://{{ .Release.Name }}-zipkin:9411/health" >/dev/null
{{- end }}
{{- if .Values.prometheus.enabled }}
---
apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-test-prometheus"
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: prometheus
      image: curlimages/curl:8.8.0
      command:
        - /bin/sh
        - -ec
        - curl -fsS "http://{{ .Release.Name }}-prometheus:9090/prometheus/-/healthy" >/dev/null
{{- end }}
{{- if .Values.elk.enabled }}
---
apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-test-logstash"
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: logstash
      image: busybox:1.36
      command:
        - /bin/sh
        - -ec
        - nc -zv {{ .Release.Name }}-elk-logstash 5044
{{- end }}
