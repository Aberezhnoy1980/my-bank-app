{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-test-postgres"
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: postgres
      image: postgres:16-alpine
      command:
        - /bin/sh
        - -ec
        - pg_isready -h {{ .Release.Name }}-postgres -p 5432 -U mybank -d mybank
{{- end }}
{{- if .Values.keycloak.enabled }}
---
apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-test-keycloak"
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: keycloak
      image: curlimages/curl:8.8.0
      command:
        - /bin/sh
        - -ec
        - curl -fsS "http://{{ .Release.Name }}-keycloak:8080/realms/{{ .Values.global.keycloak.realm }}/.well-known/openid-configuration" >/dev/null
{{- end }}
