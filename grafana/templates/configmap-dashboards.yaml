{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "grafana.dashboardsConfigMapName" . }}
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
data:
  mybank-http.json: |
{{ .Files.Get "config/dashboards/mybank-http.json" | indent 4 }}
  mybank-jvm.json: |
{{ .Files.Get "config/dashboards/mybank-jvm.json" | indent 4 }}
  mybank-business.json: |
{{ .Files.Get "config/dashboards/mybank-business.json" | indent 4 }}
{{- end }}
