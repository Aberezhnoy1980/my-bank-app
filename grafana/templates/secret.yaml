{{- if .Values.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "grafana.secretName" . }}
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-user: {{ .Values.admin.user | quote }}
  admin-password: {{ .Values.admin.password | quote }}
{{- end }}
