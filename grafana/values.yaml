enabled: true

image:
  repository: grafana/grafana
  tag: "11.1.0"
  pullPolicy: IfNotPresent

service:
  port: 3000

admin:
  user: admin
  # Override in non-dev: helm --set grafana.admin.password=...
  password: admin

resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    memory: 512Mi
